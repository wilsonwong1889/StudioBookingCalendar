name: Staging Image

on:
  workflow_dispatch:
  push:
    branches: ["develop"]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - name: Build API image
        run: docker build -t studio-booking-api:staging .
      - name: Render compose config
        run: docker compose config
