<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 835 215" role="img" aria-label="Arts Marvels">

  <!--
    Icon: two overlapping "A" letterforms.
    Each A is drawn as a 7-point outer path + inner hollow triangle,
    using fill-rule="evenodd" so the center cuts out correctly.
    Red A is drawn first (behind). Black A is drawn second (in front).
  -->

  <!-- Red "A" — left, behind black A -->
  <path fill-rule="evenodd"
        d="M 80,7 L 155,207 L 118,207 L 105,143 L 55,143 L 42,207 L 5,207 Z
           M 80,12 L 105,127 L 55,127 Z"
        fill="#e31e24"/>

  <!-- Black "A" — right, overlaps red A's right leg -->
  <path fill-rule="evenodd"
        d="M 141,7 L 216,207 L 179,207 L 166,143 L 116,143 L 103,207 L 66,207 Z
           M 141,12 L 166,127 L 116,127 Z"
        fill="#111111"/>

  <!-- Thin vertical separator -->
  <line x1="236" y1="14" x2="236" y2="205" stroke="#111111" stroke-width="3"/>

  <!-- "ARTS" in red -->
  <text x="256" y="100"
        font-family="Impact, Haettenschweiler, 'Arial Black', sans-serif"
        font-size="125" fill="#e31e24">ARTS</text>

  <!-- "MARVELS" in black -->
  <text x="256" y="210"
        font-family="Impact, Haettenschweiler, 'Arial Black', sans-serif"
        font-size="138" fill="#111111">MARVELS</text>

</svg>
