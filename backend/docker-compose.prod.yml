services:
  db:
    image: postgres:15
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-studio_booking}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-studio_booking}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:password@db:5432/studio_booking}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CELERY_TASK_ALWAYS_EAGER: "false"
      AUTO_SEED_DATA: "false"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./app/frontend/media/staff:/app/app/frontend/media/staff
    ports:
      - "8000:8000"
    command: sh scripts/start_api.sh
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:password@db:5432/studio_booking}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CELERY_TASK_ALWAYS_EAGER: "false"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: sh scripts/start_worker.sh

  beat:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:password@db:5432/studio_booking}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CELERY_TASK_ALWAYS_EAGER: "false"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: sh scripts/start_beat.sh

volumes:
  postgres_data:
