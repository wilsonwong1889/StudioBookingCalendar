services:
  db:
    image: postgres:15
    container_name: studio_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: studio_booking
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d studio_booking"]
      interval: 5s
      timeout: 5s
      retries: 10
  redis:
    image: redis:7
    container_name: studio_redis
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: studio_api
    restart: always
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:password@db:5432/studio_booking
      REDIS_URL: redis://redis:6379/0
      CELERY_TASK_ALWAYS_EAGER: "false"
      AUTO_SEED_DATA: "true"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./app/frontend/media:/app/app/frontend/media
    ports:
      - "8000:8000"
    command: sh scripts/start_api.sh
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: studio_worker
    restart: always
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:password@db:5432/studio_booking
      REDIS_URL: redis://redis:6379/0
      CELERY_TASK_ALWAYS_EAGER: "false"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: sh scripts/start_worker.sh
  beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: studio_beat
    restart: always
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:password@db:5432/studio_booking
      REDIS_URL: redis://redis:6379/0
      CELERY_TASK_ALWAYS_EAGER: "false"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: sh scripts/start_beat.sh

volumes:
  postgres_data:
